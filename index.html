<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrokenCorner | The Shadows</title>
    <style>
        /* Base Dark Theme & CSS Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body {
            background-color: #121212;
            color: #00ff41; /* Hacker Green */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Glassmorphism & Neumorphism Container */
        .login-container {
            background: rgba(18, 18, 18, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 65, 0.2);
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            box-shadow:  8px 8px 16px #070707, -8px -8px 16px #1d1d1d; /* Neumorphic dark shadow */
            text-align: center;
        }

        /* Glitch Effect for Title */
        .glitch {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            animation: glitch-skew 2s infinite linear alternate-reverse;
        }

        /* Inputs - Neumorphic Inset */
        .input-group { margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 15px;
            background: #121212;
            border: none;
            color: #00ff41;
            font-size: 16px;
            border-radius: 10px;
            box-shadow: inset 4px 4px 8px #070707, inset -4px -4px 8px #1d1d1d;
            outline: none;
            transition: 0.3s;
        }
        input:focus { box-shadow: inset 2px 2px 4px #070707, inset -2px -2px 4px #1d1d1d; }

        /* Neumorphic Buttons */
        button {
            width: 100%;
            padding: 15px;
            background: #121212;
            color: #00ff41;
            border: 1px solid rgba(0, 255, 65, 0.1);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 10px;
            box-shadow: 5px 5px 10px #070707, -5px -5px 10px #1d1d1d;
            transition: all 0.2s ease-in-out;
            margin-bottom: 15px;
        }
        button:active {
            box-shadow: inset 4px 4px 8px #070707, inset -4px -4px 8px #1d1d1d;
            color: #00b32d;
        }

        .generate-btn { color: #ff003c; border-color: rgba(255, 0, 60, 0.2); }
        
        .footer-text { font-size: 12px; color: #555; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="glitch">Welcome to the Shadows</div>
        
        <div id="login-section">
            <div class="input-group">
                <input type="text" id="anonymous-id" placeholder="Enter ID (e.g. BC-1527GA)" autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" id="secret-password" placeholder="Enter Secret Password">
            </div>
            <button id="login-btn">ENTER VAULT</button>
        </div>

        <hr style="border-color: #333; margin: 20px 0;">

        <button class="generate-btn" id="generate-id-btn">GENERATE NEW IDENTITY</button>
        
        <div class="footer-text">Connection: End-to-End Encrypted<br> Safest Secret Dealing Platform!<br> By Constant Abrar</div>
    </div>

    <script type="module" src="./js/firebase.js"></script>
   <script type="module" src="./js/ui.js"></script>

</body>
</html>
